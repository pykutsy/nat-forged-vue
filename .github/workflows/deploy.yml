name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Pages has no rewrite rule, so a request for /resources finds no file and
      # falls through to 404.html — which renders correctly but returns a 404
      # status, keeping the route out of search results and breaking link
      # previews. Writing a real index.html at each route makes Pages answer 200.
      # Routes are read from the router so this cannot drift as pages are added.
      - name: Write an index.html for each route
        run: |
          set -euo pipefail
          routes=$(grep -oE "path: '/[^']*'" src/router/index.js \
            | sed "s/path: '//; s/'//" \
            | grep -v '^/$' \
            | grep -v ':')
          if [ -z "$routes" ]; then
            echo "No routes matched — refusing to deploy a site with broken URLs." >&2
            exit 1
          fi
          for r in $routes; do
            mkdir -p "dist$r"
            cp dist/index.html "dist$r/index.html"
            echo "  200 <- $r"
          done

      # Unknown paths still land here, where the router renders NotFoundView.
      # This one is meant to be a 404.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
